<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de Preguntes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA 1: Benvinguda + nom -->
    <section id="pantallaBenvinguda" class="pantalla activa">
        <div class="targeta">
            <span class="icon">🎮</span>
            <h1>Joc de Preguntes</h1>
            <p class="subTitol">Posa a prova els teus coneixements!</p>

            <div class="grupFormulari">
                <label for="inputNom" class="etiqueta">El teu nom</label>
                <input 
                    type="text" 
                    id="inputNom" 
                    class="inputNom" 
                    placeholder="Escriu el teu nom..."
                    maxlength="20"
                    autocomplete="off"
                >
                <p class="errorNom amagat" id="errorNom">⚠️ Entra un nom vàlid</p>
            </div>

            <button class="boto boto--primari" id="botoComençar">
                Començar
            </button>
        </div>
    </section>

    <!-- PANTALLA 2: Selecció de categoria -->
    <section id="pantallaCategories" class="pantalla amagada">
        <div class="targeta">
            <span class="icon">📚</span>
            <h2>Hola, <span id="nomJugador"></span>!</h2>
            <p class="subTitol">Escull una categoria</p>

            <div class="gridCategories">
                <button class="boto boto--categoria" data-categoria="cat-0">
                    <span class="categoriaIcon">❓</span>
                    <span class="categoriaNom">Categoria A</span>
                    <span class="categoriaDesc">10 preguntes</span>
                </button>
                <button class="boto boto--categoria" data-categoria="cat-1">
                    <span class="categoriaIcon">❓</span>
                    <span class="categoriaNom">Categoria B</span>
                    <span class="categoriaDesc">10 preguntes</span>
                </button>
            </div>
        </div>
    </section>

    <!-- PANTALLA 3: Joc -->
    <section id="pantallaJoc" class="pantalla amagada">
        <div class="targeta targeta--joc">

            <!-- Capçalera del joc -->
            <div class="jocCapcalera">
                <span class="jocCategoria" id="jocCategoria">Categoria</span>
                <div class="timer" id="timer">
                    <span class="timerNumero" id="timerNumero">30</span>s
                </div>
            </div>

            <!-- Barra de progrés -->
            <div class="barraProgres">
                <div class="barraProgresInner" id="barraProgresInner"></div>
            </div>
            <p class="progresText" id="progresText">Pregunta 1 de 10</p>

            <!-- Pregunta -->
            <p class="pregunta" id="textPregunta">La pregunta apareixerà aquí</p>

            <!-- Opcions -->
            <div class="gridOpcions" id="gridOpcions">
                <button class="boto boto--opcio" data-index="0">Opció A</button>
                <button class="boto boto--opcio" data-index="1">Opció B</button>
                <button class="boto boto--opcio" data-index="2">Opció C</button>
                <button class="boto boto--opcio" data-index="3">Opció D</button>
            </div>

            <!-- Feedback (amagat fins resposta) -->
            <div class="feedback amagat" id="feedback">
                <p id="feedbackText"></p>
                <button class="boto boto--primari" id="botoSeguent">Següent →</button>
            </div>

        </div>
    </section>

    <!-- PANTALLA 4: Resultats (renderitzada per JS) -->
    <section id="pantallaResultats" class="pantalla amagada">
    </section>

    <script src="js/script.js"></script>
</body>
</html>
